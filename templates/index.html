<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page">
        <section class="hero">
            <p class="eyebrow">Analizador local</p>
            <h1>Resume una pagina web a partir de su URL</h1>
            <p class="intro">Introduce una direccion web y obtendras un resumen breve con los puntos principales del contenido visible de la pagina.</p>
        </section>

        <section class="panel">
            <form method="post" class="summary-form">
                <label for="url">URL de la pagina</label>
                <div class="input-row">
                    <input
                        id="url"
                        name="url"
                        type="url"
                        placeholder="https://ejemplo.com/articulo"
                        value="{{ url }}"
                        required
                    >
                    <button type="submit">Resumir</button>
                </div>
            </form>

            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}

            {% if resumen %}
                <article class="result">
                    <p class="result-label">Resumen generado</p>
                    <p class="result-url">{{ url }}</p>
                    <div class="result-body">{{ resumen }}</div>
                </article>
            {% endif %}
        </section>
    </main>
</body>
</html>
